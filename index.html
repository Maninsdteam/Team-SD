<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart IT SD Team Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #111;
  color: #fff;
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.search {
  margin-bottom: 15px;
}

input {
  padding: 8px;
  width: 250px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.name {
  font-size: 16px;
  font-weight: bold;
}

.role {
  color: gray;
  font-size: 13px;
}

.tag {
  display: inline-block;
  background: #e3f2fd;
  padding: 3px 8px;
  margin: 2px;
  border-radius: 4px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>South IT Service Delivery Team</header>

<div class="container">

<input type="text" id="search" placeholder="Search..." onkeyup="filterData()" />

<div id="list"></div>

</div>

<script>

const ENGINEERS = [
  {
    name: "Mani N",
    role: "Senior Manager - Service Delivery",
    location: "Bangalore ETV Office",
    phone: "+91 9500160607"
  },
  {
    name: "Pokuri Anil",
    role: "Senior Engineer",
    location: "Vijayawada / Vizag",
    phone: "+91 9700594177"
  },
  {
    name: "Jayaprakash P",
    role: "Senior Engineer",
    location: "Hubli / Hosur",
    phone: "+91 9003624529"
  },
  {
    name: "Karthikeyan K",
    role: "Senior Engineer",
    location: "Coimbatore",
    phone: "+91 8870951950"
  },
  {
    name: "Kamalakannan T",
    role: "Senior Engineer",
    location: "Chennai",
    phone: "+91 9003922009"
  },
  {
    name: "Prashanth Hosad",
    role: "Assistant Manager",
    location: "Bangalore",
    phone: "+91 7337805237"
  }
];

function render(data) {
  let html = "";
  data.forEach(e => {
    html += `
      <div class="card">
        <div class="name">${e.name}</div>
        <div class="role">${e.role}</div>
        <div class="tag">${e.location}</div>
        <div class="tag">📞 ${e.phone}</div>
      </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function filterData() {
  let q = document.getElementById("search").value.toLowerCase();
  let filtered = ENGINEERS.filter(e =>
    e.name.toLowerCase().includes(q) ||
    e.location.toLowerCase().includes(q)
  );
  render(filtered);
}

render(ENGINEERS);

</script>

</body>
</html>
